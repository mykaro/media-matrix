clean:
  title_white: 'Очищення '
  title_green: медіафайлів
  description: Автоматичний пошук та переміщення розмитих, занадто темних або пошкоджених
    файлів.
  stat_bad: БРАКУ
  dir_title: Директорія сканування
  path_hint: Оберіть папку для сканування
  dir_hint: 📁 Програма автоматично створить папку {prefix}<назва> поруч із обраною
    директорією та перемістить туди весь знайдений брак.
  photo_title: Фільтри для ФОТО
  blur_title: Розмитість (Blur)
  blur_label: Поріг
  blur_tooltip: |-
    Відбраковує розмиті та нечіткі фотографії. Усі фото, де менше чітких деталей, потраплять до браку.

    💡 Рекомендація: 100. Якщо перевірка занадто сувора — зменшіть до 60-80.
  exp_title: Експозиція
  exp_dark_label: Темне <
  exp_bright_label: Світле >
  exp_tooltip: |-
    Відбраковує занадто темні (менше ліміту '<') або пересвічені (більше ліміту '>') кадри.

    💡 Рекомендація: залишайте <30 для темних і >235 для світлих. Якщо нормальні нічні фото потрапляють у брак — зменште темний поріг.
  res_title: Мін. роздільна здатність
  res_tooltip: |-
    Відбраковує зображення, розмір яких менший за обраний. Допомагає відсіяти дрібні прев'ю та системні іконки.

    💡 Рекомендація: 800x600.
  corrupted_title: Пошук битих файлів
  corrupted_tooltip: Файли з пошкодженою структурою (які неможливо відкрити), потраплять
    до браку.
  video_title: Фільтри для ВІДЕО
  dur_title: Мін. тривалість (сек)
  dur_tooltip: |-
    Відбраковує відео, коротші за вказаний час (напр., випадкові дотики до кнопки).

    💡 Рекомендація: 3 секунди.
  vid_res_title: Мін. роздільна здатність
  vid_res_tooltip: |-
    Відбраковує відео, роздільна здатність яких менша за вказану.

    💡 Рекомендація: 480p або 720p.
  vid_dark_title: Темне відео
  vid_dark_tooltip: |-
    Відбраковує відео, кадри яких загалом занадто темні (зняті вночі або з закритою лінзою).

    ⚠️ Увага: Увімкнення значно збільшує час перевірки, оскільки потребує детального аналізу кожного кадру відео.
  vid_sound_title: Відсутній звук
  vid_sound_tooltip: Відбраковує відео, які взагалі не містять звукової доріжки (наприклад,
    пошкоджений запис або знято камерою без мікрофона).
  btn_run: Запустити очищення
  launch_safe: |
    Безпечний аналіз.
  launch_hint: 'Брак буде переміщено у папку '
  launch_hint_end: ' без безповоротного видалення.'
  stop_msg: ⚠️ Зупинка процесу...
  error_parse: Помилка розбору налаштувань. Перевірте числа.
  error_folder: 'Помилка: Оберіть папку.'
